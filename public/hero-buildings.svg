<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice">
  <defs>
    <!-- Sky gradient: near black at top, dark charcoal at horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <!-- Ground glow (red atmospheric light at base) -->
    <radialGradient id="groundGlow" cx="50%" cy="100%" r="60%" fx="50%" fy="100%">
      <stop offset="0%" stop-color="#cc0000" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#880000" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Center glow behind buildings -->
    <radialGradient id="centerGlow" cx="50%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#550000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Building gradient: pitch black silhouette with slight edge definition -->
    <linearGradient id="buildingMain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="50%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>

    <!-- Window glow filter -->
    <filter id="windowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle edge light on buildings -->
    <filter id="edgeLight">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#sky)"/>
  <rect width="1440" height="900" fill="url(#centerGlow)"/>

  <!-- ==============================
       BACK LAYER – distant skyline
  ============================== -->

  <!-- Far left tower -->
  <rect x="30" y="380" width="60" height="520" fill="#090909"/>
  <rect x="45" y="360" width="30" height="30" fill="#090909"/>

  <!-- Far right tower -->
  <rect x="1350" y="400" width="60" height="500" fill="#090909"/>
  <rect x="1360" y="360" width="40" height="50" fill="#090909"/>

  <!-- Background city mass left -->
  <rect x="80" y="460" width="120" height="440" fill="#0a0a0a"/>
  <rect x="90" y="430" width="100" height="40" fill="#0a0a0a"/>
  <rect x="180" y="500" width="80" height="400" fill="#0a0a0a"/>
  <rect x="250" y="540" width="100" height="360" fill="#0a0a0a"/>
  <rect x="340" y="480" width="70" height="420" fill="#0a0a0a"/>

  <!-- Background city mass right -->
  <rect x="1100" y="490" width="90" height="410" fill="#0a0a0a"/>
  <rect x="1180" y="460" width="80" height="440" fill="#0a0a0a"/>
  <rect x="1250" y="520" width="110" height="380" fill="#0a0a0a"/>

  <!-- ==============================
       MID LAYER
  ============================== -->

  <!-- Left mid building -->
  <rect x="60" y="340" width="110" height="560" fill="#0c0c0c"/>
  <!-- stepped top -->
  <rect x="75" y="310" width="80" height="40" fill="#0c0c0c"/>
  <rect x="90" y="285" width="50" height="30" fill="#0c0c0c"/>
  <!-- antenna -->
  <rect x="112" y="240" width="4" height="50" fill="#111"/>

  <!-- Mid-left building -->
  <rect x="300" y="300" width="140" height="600" fill="#0e0e0e"/>
  <rect x="315" y="270" width="110" height="40" fill="#0e0e0e"/>
  <rect x="330" y="245" width="80" height="30" fill="#0e0e0e"/>
  <rect x="355" y="200" width="30" height="50" fill="#111"/>
  <!-- antenna top -->
  <rect x="368" y="160" width="4" height="44" fill="#111"/>

  <!-- Mid right building -->
  <rect x="1010" y="320" width="130" height="580" fill="#0e0e0e"/>
  <rect x="1020" y="290" width="110" height="35" fill="#0e0e0e"/>
  <rect x="1035" y="265" width="80" height="30" fill="#0e0e0e"/>

  <!-- Right mid -->
  <rect x="1280" y="350" width="120" height="550" fill="#0c0c0c"/>
  <rect x="1295" y="318" width="90" height="38" fill="#0c0c0c"/>

  <!-- ==============================
       MAIN LAYER – hero buildings
  ============================== -->

  <!-- MAIN LEFT TOWER (tall modern skyscraper) -->
  <rect x="150" y="100" width="180" height="800" fill="#0f0f0f"/>
  <!-- stepped top detail -->
  <rect x="165" y="75" width="150" height="35" fill="#0f0f0f"/>
  <rect x="185" y="52" width="110" height="28" fill="#0f0f0f"/>
  <rect x="205" y="30" width="70" height="28" fill="#111"/>
  <!-- Vertical grooves (facade detail) -->
  <rect x="195" y="100" width="4" height="800" fill="#0a0a0a"/>
  <rect x="220" y="100" width="4" height="800" fill="#0a0a0a"/>
  <rect x="245" y="100" width="4" height="800" fill="#0a0a0a"/>
  <rect x="270" y="100" width="4" height="800" fill="#0a0a0a"/>
  <rect x="295" y="100" width="4" height="800" fill="#0a0a0a"/>
  <!-- Window rows – subtle warm glow -->
  <rect x="162" y="120" width="16" height="8" rx="1" fill="#1a0a00" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="183" y="120" width="16" height="8" rx="1" fill="#1a0800" opacity="0.4"/>
  <rect x="204" y="120" width="16" height="8" rx="1" fill="#1a0a00" opacity="0.7"/>
  <rect x="162" y="140" width="16" height="8" rx="1" fill="#150600" opacity="0.5"/>
  <rect x="204" y="140" width="16" height="8" rx="1" fill="#1a0a00" opacity="0.3"/>
  <rect x="225" y="140" width="16" height="8" rx="1" fill="#1a0800" opacity="0.5"/>
  <rect x="162" y="160" width="16" height="8" rx="1" fill="#1a0a00" opacity="0.4"/>
  <rect x="183" y="160" width="16" height="8" rx="1" fill="#1a0800" opacity="0.6"/>
  <rect x="246" y="160" width="16" height="8" rx="1" fill="#1a0a00" opacity="0.3"/>

  <!-- MAIN CENTER-LEFT BUILDING -->
  <rect x="430" y="180" width="200" height="720" fill="#111"/>
  <rect x="445" y="150" width="170" height="38" fill="#111"/>
  <rect x="465" y="122" width="130" height="35" fill="#111"/>
  <rect x="490" y="95" width="80" height="32" fill="#111"/>
