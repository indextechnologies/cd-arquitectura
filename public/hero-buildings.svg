  <rect x="526" y="50" width="6" height="50" fill="#131313"/>
  <!-- Facade detail - horizontal bands -->
  <rect x="430" y="220" width="200" height="3" fill="#0d0d0d"/>
  <rect x="430" y="280" width="200" height="3" fill="#0d0d0d"/>
  <rect x="430" y="340" width="200" height="3" fill="#0d0d0d"/>
  <rect x="430" y="400" width="200" height="3" fill="#0d0d0d"/>
  <rect x="430" y="460" width="200" height="3" fill="#0d0d0d"/>
  <rect x="430" y="520" width="200" height="3" fill="#0d0d0d"/>
  <rect x="430" y="580" width="200" height="3" fill="#0d0d0d"/>
  <!-- Windows scattered, some lit -->
  <rect x="445" y="195" width="18" height="10" rx="1" fill="#1f0d00" opacity="0.5"/>
  <rect x="470" y="195" width="18" height="10" rx="1" fill="#1a0800" opacity="0.7" filter="url(#windowGlow)"/>
  <rect x="520" y="195" width="18" height="10" rx="1" fill="#1f0d00" opacity="0.3"/>
  <rect x="445" y="240" width="18" height="10" rx="1" fill="#1a0800" opacity="0.6"/>
  <rect x="495" y="240" width="18" height="10" rx="1" fill="#1f0d00" opacity="0.4"/>
  <rect x="545" y="240" width="18" height="10" rx="1" fill="#1a0800" opacity="0.5"/>
  <rect x="470" y="295" width="18" height="10" rx="1" fill="#200d00" opacity="0.45"/>
  <rect x="520" y="295" width="18" height="10" rx="1" fill="#1a0800" opacity="0.35"/>

  <!-- HERO CENTER TOWER (tallest, dominant) -->
  <rect x="660" y="60" width="220" height="840" fill="#131313"/>
  <!-- stepped crown -->
  <rect x="675" y="35" width="190" height="33" fill="#131313"/>
  <rect x="695" y="12" width="150" height="28" fill="#141414"/>
  <rect x="720" y="-5" width="100" height="22" fill="#141414"/>
  <!-- Spire -->
  <rect x="766" y="-50" width="8" height="60" fill="#161616"/>
  <!-- Vertical facade grooves -->
  <rect x="700" y="60" width="5" height="840" fill="#0e0e0e"/>
  <rect x="730" y="60" width="5" height="840" fill="#0e0e0e"/>
  <rect x="760" y="60" width="5" height="840" fill="#0e0e0e"/>
  <rect x="790" y="60" width="5" height="840" fill="#0e0e0e"/>
  <rect x="820" y="60" width="5" height="840" fill="#0e0e0e"/>
  <!-- Horizontal bands -->
  <rect x="660" y="140" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="200" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="260" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="320" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="380" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="440" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="500" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="560" width="220" height="3" fill="#0d0d0d"/>
  <rect x="660" y="620" width="220" height="3" fill="#0d0d0d"/>
  <!-- Windows – various lit states -->
  <rect x="670" y="80" width="20" height="12" rx="1" fill="#200e00" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="698" y="80" width="20" height="12" rx="1" fill="#1a0800" opacity="0.4"/>
  <rect x="726" y="80" width="20" height="12" rx="1" fill="#200e00" opacity="0.75" filter="url(#windowGlow)"/>
  <rect x="754" y="80" width="20" height="12" rx="1" fill="#1a0800" opacity="0.3"/>
  <rect x="782" y="80" width="20" height="12" rx="1" fill="#200e00" opacity="0.5"/>
  <rect x="810" y="80" width="20" height="12" rx="1" fill="#1a0800" opacity="0.4"/>
  <rect x="670" y="155" width="20" height="12" rx="1" fill="#1a0800" opacity="0.3"/>
  <rect x="726" y="155" width="20" height="12" rx="1" fill="#200e00" opacity="0.5"/>
  <rect x="782" y="155" width="20" height="12" rx="1" fill="#1a0800" opacity="0.45"/>
  <rect x="698" y="215" width="20" height="12" rx="1" fill="#200e00" opacity="0.4"/>
  <rect x="754" y="215" width="20" height="12" rx="1" fill="#1a0800" opacity="0.6" filter="url(#windowGlow)"/>
  <rect x="810" y="215" width="20" height="12" rx="1" fill="#1a0800" opacity="0.3"/>
  <rect x="670" y="275" width="20" height="12" rx="1" fill="#200e00" opacity="0.35"/>
  <rect x="726" y="275" width="20" height="12" rx="1" fill="#1a0800" opacity="0.5"/>
  <rect x="782" y="335" width="20" height="12" rx="1" fill="#200e00" opacity="0.4"/>

  <!-- MAIN CENTER-RIGHT BUILDING -->
  <rect x="910" y="200" width="190" height="700" fill="#111"/>
  <rect x="925" y="170" width="160" height="38" fill="#111"/>
  <rect x="945" y="143" width="120" height="32" fill="#111"/>
  <rect x="965" y="118" width="80" height="30" fill="#111"/>
  <!-- Facade -->
  <rect x="910" y="250" width="190" height="3" fill="#0d0d0d"/>
  <rect x="910" y="310" width="190" height="3" fill="#0d0d0d"/>
  <rect x="910" y="370" width="190" height="3" fill="#0d0d0d"/>
  <rect x="910" y="430" width="190" height="3" fill="#0d0d0d"/>
  <rect x="910" y="490" width="190" height="3" fill="#0d0d0d"/>
  <rect x="910" y="550" width="190" height="3" fill="#0d0d0d"/>
  <!-- Windows -->
  <rect x="920" y="218" width="18" height="10" rx="1" fill="#1a0800" opacity="0.5"/>
  <rect x="945" y="218" width="18" height="10" rx="1" fill="#200e00" opacity="0.4"/>
  <rect x="970" y="218" width="18" height="10" rx="1" fill="#1a0800" opacity="0.65" filter="url(#windowGlow)"/>
  <rect x="920" y="268" width="18" height="10" rx="1" fill="#200e00" opacity="0.35"/>
  <rect x="970" y="268" width="18" height="10" rx="1" fill="#1a0800" opacity="0.4"/>
  <rect x="1020" y="268" width="18" height="10" rx="1" fill="#200e00" opacity="0.5"/>
  <rect x="945" y="328" width="18" height="10" rx="1" fill="#1a0800" opacity="0.3"/>
  <rect x="995" y="328" width="18" height="10" rx="1" fill="#200e00" opacity="0.45"/>

  <!-- MAIN RIGHT TOWER -->
  <rect x="1150" y="130" width="175" height="770" fill="#0f0f0f"/>
  <rect x="1165" y="102" width="145" height="34" fill="#0f0f0f"/>
  <rect x="1185" y="76" width="105" height="30" fill="#0f0f0f"/>
  <rect x="1205" y="52" width="65" height="28" fill="#111"/>
  <!-- Antenna -->
  <rect x="1234" y="10" width="5" height="46" fill="#131313"/>
  <!-- Facade grooves -->
  <rect x="1190" y="130" width="4" height="770" fill="#0a0a0a"/>
  <rect x="1215" y="130" width="4" height="770" fill="#0a0a0a"/>
  <rect x="1240" y="130" width="4" height="770" fill="#0a0a0a"/>
  <rect x="1265" y="130" width="4" height="770" fill="#0a0a0a"/>
  <!-- Windows -->
  <rect x="1160" y="148" width="16" height="9" rx="1" fill="#1a0800" opacity="0.5"/>
  <rect x="1182" y="148" width="16" height="9" rx="1" fill="#200e00" opacity="0.4"/>
  <rect x="1204" y="148" width="16" height="9" rx="1" fill="#1a0800" opacity="0.7" filter="url(#windowGlow)"/>
  <rect x="1226" y="148" width="16" height="9" rx="1" fill="#200e00" opacity="0.3"/>
  <rect x="1160" y="178" width="16" height="9" rx="1" fill="#1a0800" opacity="0.35"/>
  <rect x="1204" y="178" width="16" height="9" rx="1" fill="#200e00" opacity="0.55"/>
  <rect x="1248" y="178" width="16" height="9" rx="1" fill="#1a0800" opacity="0.4"/>
  <rect x="1182" y="210" width="16" height="9" rx="1" fill="#1a0800" opacity="0.45"/>
  <rect x="1226" y="210" width="16" height="9" rx="1" fill="#200e00" opacity="0.35"/>

  <!-- ==============================
       FOREGROUND ground plane
  ============================== -->
  <rect x="0" y="820" width="1440" height="80" fill="#050505"/>

  <!-- Ground atmospheric glow -->
  <rect width="1440" height="900" fill="url(#groundGlow)"/>

  <!-- Fog/mist overlay at top to blend into page -->
  <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#000000" stop-opacity="1"/>
    <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
  </linearGradient>
  <rect width="1440" height="900" fill="url(#topFade)"/>

  <!-- Bottom fade into page -->
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
  </linearGradient>
  <rect width="1440" height="900" fill="url(#bottomFade)"/>
</svg>
